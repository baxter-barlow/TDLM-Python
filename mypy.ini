[mypy]
python_version = 3.10
strict = True
files = tdlm
exclude = (^tdlm/tests/)
show_error_codes = True
pretty = True

[mypy-numba.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-cycler.*]
ignore_missing_imports = True
