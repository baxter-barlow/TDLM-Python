name: MATLAB optional engine tests

on:
  workflow_dispatch:

jobs:
  run-matlab-optional-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up MATLAB
      id: setup-matlab
      uses: matlab-actions/setup-matlab@v2
      with:
        release: R2024b

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set LD_LIBRARY_PATH for MATLAB
      run: echo "LD_LIBRARY_PATH=${{ steps.setup-matlab.outputs.matlab-root }}/bin/glnxa64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install -r requirements-matlab.txt
        pip install -e .

    - name: Check MATLAB engine availability
      id: enginecheck
      run: |
        python - <<'PY'
        import importlib.util
        import os

        available = (
            importlib.util.find_spec("matlab") is not None
            and importlib.util.find_spec("matlab.engine") is not None
        )
        print(f"MATLAB engine available: {available}")
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"available={'true' if available else 'false'}\\n")
        PY

    - name: Run optional MATLAB engine tests
      if: steps.enginecheck.outputs.available == 'true'
      env:
        TDLM_ENABLE_MATLAB_ENGINE_TESTS: '1'
      run: pytest -q -m "matlab_engine_optional"

    - name: Skip notice
      if: steps.enginecheck.outputs.available != 'true'
      run: echo "MATLAB engine unavailable, skipping optional engine parity tests."
