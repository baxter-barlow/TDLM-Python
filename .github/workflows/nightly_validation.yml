name: Nightly validation

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  strict-statistical-validity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-test.txt
        pip install -e .

    - name: Run strict statistical validity tests
      env:
        TDLM_RUN_STATISTICAL_SLOW: '1'
      run: pytest -q -m "statistical_slow"

  integration-realdata-full:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-test.txt
        pip install -e .

    - name: Run full integration tests
      run: pytest -q -m "integration_slow"

  perf-regression-enforce:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-test.txt
        pip install -e .

    - name: Enforce performance regression threshold
      env:
        TDLM_PERF_EXPECTED_OS: Linux
        TDLM_PERF_EXPECTED_PYTHON: '3.10'
        TDLM_PERF_STRICT_BASELINE_META: '1'
      run: |
        python tdlm/tests/benchmarks/run_perf_regression.py \
          --mode enforce \
          --baseline tdlm/tests/benchmarks/baseline_ubuntu_py310.json \
          --threshold "${TDLM_PERF_THRESHOLD:-0.20}" \
          --output tdlm/tests/benchmarks/perf_enforce_report.json

    - name: Upload performance enforcement artifact
      uses: actions/upload-artifact@v4
      with:
        name: perf-enforce-report-${{ matrix.python-version }}
        path: tdlm/tests/benchmarks/perf_enforce_report.json
        if-no-files-found: error

  optional-matlab-engine-parity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up MATLAB
      id: setup-matlab
      uses: matlab-actions/setup-matlab@v2
      with:
        release: R2024b

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set LD_LIBRARY_PATH for MATLAB
      run: echo "LD_LIBRARY_PATH=${{ steps.setup-matlab.outputs.matlab-root }}/bin/glnxa64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install -r requirements-matlab.txt
        pip install -e .

    - name: Check MATLAB engine availability
      id: enginecheck
      run: |
        python - <<'PY'
        import importlib.util
        import os

        available = (
            importlib.util.find_spec("matlab") is not None
            and importlib.util.find_spec("matlab.engine") is not None
        )
        print(f"MATLAB engine available: {available}")
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"available={'true' if available else 'false'}\\n")
        PY

    - name: Run optional MATLAB engine parity tests
      if: steps.enginecheck.outputs.available == 'true'
      env:
        TDLM_ENABLE_MATLAB_ENGINE_TESTS: '1'
      run: pytest -q -m "matlab_engine_optional"

    - name: Skip notice
      if: steps.enginecheck.outputs.available != 'true'
      run: echo "MATLAB engine unavailable, skipping optional engine parity tests."
