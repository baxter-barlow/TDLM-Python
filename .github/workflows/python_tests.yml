name: Python tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-test.txt
        pip install -e .

    - name: Type check (mypy strict)
      run: mypy tdlm

    - name: Run Python tests (PR-safe)
      run: pytest -q -m "not statistical_slow and not integration_slow"

    - name: Performance report (non-gating)
      env:
        TDLM_PERF_EXPECTED_OS: Linux
        TDLM_PERF_EXPECTED_PYTHON: '3.10'
        TDLM_PERF_STRICT_BASELINE_META: '0'
      run: |
        python tdlm/tests/benchmarks/run_perf_regression.py \
          --mode report \
          --baseline tdlm/tests/benchmarks/baseline_ubuntu_py310.json \
          --threshold "${TDLM_PERF_THRESHOLD:-0.20}" \
          --output tdlm/tests/benchmarks/perf_report.json

    - name: Upload performance report artifact
      uses: actions/upload-artifact@v4
      with:
        name: perf-report-${{ matrix.python-version }}
        path: tdlm/tests/benchmarks/perf_report.json
        if-no-files-found: error
